<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Background</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0f; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    let W, H, nodes;

    const NODE_COUNT = 90;
    const CONNECT_DIST = 180;
    const SPEED = 0.25;

    const COLOR_LINE = 'rgba(180, 140, 90, ';
    const COLOR_DOT  = 'rgba(210, 160, 90, ';

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
    }

    function init() {
      nodes = Array.from({ length: NODE_COUNT }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
        r:  Math.random() * 1.5 + 1,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      /* move */
      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      }

      /* edges */
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECT_DIST) {
            const alpha = (1 - dist / CONNECT_DIST) * 0.35;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = COLOR_LINE + alpha + ')';
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }
        }
      }

      /* triangles fill (triplets within range) */
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dxab = a.x - b.x, dyab = a.y - b.y;
          if (Math.sqrt(dxab*dxab + dyab*dyab) > CONNECT_DIST) continue;
          for (let k = j + 1; k < nodes.length; k++) {
            const c = nodes[k];
            const dxac = a.x - c.x, dyac = a.y - c.y;
            const dxbc = b.x - c.x, dybc = b.y - c.y;
            if (Math.sqrt(dxac*dxac + dyac*dyac) > CONNECT_DIST) continue;
            if (Math.sqrt(dxbc*dxbc + dybc*dybc) > CONNECT_DIST) continue;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.lineTo(c.x, c.y);
            ctx.closePath();
            ctx.fillStyle = 'rgba(160, 110, 50, 0.03)';
            ctx.fill();
          }
        }
      }

      /* dots */
      for (const n of nodes) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = COLOR_DOT + '0.7)';
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
