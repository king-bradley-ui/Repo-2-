<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Background Indovinelli</title>
  <style>
    :root {
      --bg-1: #070506;
      --bg-2: #121014;
      --accent-a: rgba(255, 161, 60, 0.2);
      --accent-b: rgba(255, 196, 120, 0.1);
      --line: rgba(255, 187, 92, 0.14);
      --glyph: rgba(255, 220, 166, 0.2);
      --dot: rgba(255, 150, 40, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 22%, var(--accent-a), transparent 34%),
        radial-gradient(circle at 78% 76%, var(--accent-b), transparent 40%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      font-family: 'Times New Roman', serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="riddle-bg"></canvas>

  <script>
    const canvas = document.getElementById('riddle-bg');
    const ctx = canvas.getContext('2d');

    let w = 0;
    let h = 0;
    let dpr = Math.max(1, window.devicePixelRatio || 1);

    const sparkles = [];
    const trails = [];
    const glyphs = [];

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(arr) {
      return arr[(Math.random() * arr.length) | 0];
    }

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const sparkleCount = Math.max(34, Math.floor((w * h) / 36000));
      const trailCount = Math.max(14, Math.floor((w * h) / 95000));
      const glyphCount = Math.max(10, Math.floor((w * h) / 120000));

      sparkles.length = 0;
      trails.length = 0;
      glyphs.length = 0;

      for (let i = 0; i < sparkleCount; i++) sparkles.push(makeSparkle());
      for (let i = 0; i < trailCount; i++) trails.push(makeTrail());
      for (let i = 0; i < glyphCount; i++) glyphs.push(makeGlyph());
    }

    function makeSparkle() {
      return {
        x: rand(0, w),
        y: rand(0, h),
        r: rand(0.9, 2.6),
        vx: rand(-0.08, 0.08),
        vy: rand(-0.16, -0.04),
        a: rand(0.16, 0.5),
        pulse: rand(0, Math.PI * 2)
      };
    }

    function makeTrail() {
      const len = rand(80, 220);
      return {
        x: rand(-0.2 * w, 1.1 * w),
        y: rand(-0.1 * h, 1.1 * h),
        len,
        angle: rand(-0.65, 0.65),
        speed: rand(0.08, 0.25),
        width: rand(0.8, 1.5),
        alpha: rand(0.09, 0.23)
      };
    }

    function makeGlyph() {
      const chars = ['?', '?', '?', '!', '!', '*', '...', 'x', '->', '#'];
      return {
        char: pick(chars),
        x: rand(-120, w + 120),
        y: rand(30, h - 20),
        baseY: rand(30, h - 20),
        size: rand(16, 34),
        alpha: rand(0.1, 0.26),
        drift: rand(0.02, 0.09),
        sway: rand(8, 26),
        phase: rand(0, Math.PI * 2),
        rotAmp: rand(0.02, 0.08),
        life: rand(0, 1000)
      };
    }

    function drawGrid() {
      const step = 48; // Spaziatura più ampia come nei quaderni
      ctx.strokeStyle = 'rgba(255, 168, 72, 0.08)';
      ctx.lineWidth = 0.9;

      // Disegna righe orizzontali come nei quaderni
      for (let y = 0; y <= h + step; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }
    }

    function drawTrails() {
      for (const tr of trails) {
        ctx.save();
        ctx.translate(tr.x, tr.y);
        ctx.rotate(tr.angle);
        ctx.strokeStyle = `rgba(255, 187, 92, ${tr.alpha})`;
        ctx.lineWidth = tr.width;
        ctx.beginPath();
        ctx.moveTo(-tr.len / 2, 0);
        ctx.lineTo(tr.len / 2, 0);
        ctx.stroke();
        ctx.restore();

        tr.y += tr.speed;
        tr.x += Math.sin(tr.y * 0.005) * 0.18;

        if (tr.y - tr.len > h + 30) {
          tr.y = -tr.len - rand(0, 220);
          tr.x = rand(-0.2 * w, 1.1 * w);
        }
      }
    }

    function drawSparkles(t) {
      for (const s of sparkles) {
        const flick = (Math.sin(t * 0.002 + s.pulse) + 1) * 0.5;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r + flick * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 150, 40, ${s.a + flick * 0.15})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(s.x, s.y, (s.r * 0.45) + flick * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 230, 180, 0.28)';
        ctx.fill();

        s.x += s.vx;
        s.y += s.vy;

        if (s.y < -8) {
          s.y = h + 8;
          s.x = rand(0, w);
        }
        if (s.x < -10) s.x = w + 10;
        if (s.x > w + 10) s.x = -10;
      }
    }

    function drawGlyphs(t) {
      for (const g of glyphs) {
        g.life += g.drift;
        const wave = Math.sin(g.life + g.phase);
        const y = g.baseY + wave * g.sway;
        const rot = Math.sin(g.life * 0.8 + g.phase) * g.rotAmp;

        ctx.save();
        ctx.translate(g.x, y);
        ctx.rotate(rot);
        ctx.fillStyle = `rgba(255, 220, 166, ${g.alpha})`;
        ctx.font = `${g.size}px Times New Roman`;
        ctx.fillText(g.char, 0, 0);
        ctx.restore();

        g.x += 0.12;
        if (g.x > w + 140) {
          g.x = -140;
          g.baseY = rand(30, h - 20);
          g.size = rand(16, 34);
          g.alpha = rand(0.1, 0.26);
        }
      }
    }

    function vignette() {
      const grad = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.2, w / 2, h / 2, Math.max(w, h) * 0.75);
      grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
      grad.addColorStop(1, 'rgba(0, 0, 0, 0.24)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function tick(t) {
      ctx.clearRect(0, 0, w, h);
      drawGrid();
      drawTrails();
      drawGlyphs(t || 0);
      drawSparkles(t || 0);
      vignette();
      requestAnimationFrame(tick);
    }

    window.addEventListener('resize', resize, { passive: true });
    resize();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
