<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Formule</title>
        
		<link rel="stylesheet" href="../css/formule2_style.css">

		<!-- uso MathJax per la visualizzazione delle formule matematiche -->
		<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
		<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
	</head>
    
	<body>
        
	<iframe src="../../Fonti/animated-background-formule.html"></iframe>

	<!-- parte riguardante il titolo -->
	<div class="container-title">
		<h2>Math-Rounder</h2>
		<hr class="header-separator">
	</div>

	<!-- progress bar -->
	<div class="container-progress_bar">
		<div class="progress-container">
			<div class="progress-bar" id="quiz-progress-bar" style="width: 0%;"></div>
		</div>
		<div class="progress-bar_Nquestion">
			Domanda <span id="current-question">  </span> di <span id="total-questions">  </span>
		</div>
	</div>

	<!-- parte del container delle domande e delle risposte -->
	<div class="container-qa_box">
		<!-- box delle domande -->
		<div class="container-question_box">
			<h1></h1>
		</div>
            
		<!-- box delle risposte -->
		<div class="container-answer_box">

			<div class="answer_options">
				<button type="button" class="answer-btn"><span class="option-text">A) Formula 1</span></button>
				<button type="button" class="answer-btn"><span class="option-text">B) Formula 2</span></button>
				<button type="button" class="answer-btn"><span class="option-text">C) Formula 3</span></button>
				<button type="button" class="answer-btn"><span class="option-text">D) Formula 4</span></button>
			</div>
		</div>
	</div>

	<!-- bottone per la domanda successiva -->
	<div class="container-next_btn">
		<button class="next-btn" type="button">Domanda Successiva</button>
	</div>

	<script type="module" src="../Js/formule_script.js"></script>

</body>
</html>
